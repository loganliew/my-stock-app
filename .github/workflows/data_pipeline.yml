name: 📈 台股全市場財報與月營收自動化中台

on:
  schedule:
    - cron: '23 */2 * * *'# 測試奇怪時間trigger
  workflow_dispatch: # 保留手動按鈕

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 複製專案程式碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: 🏃 執行【一號工人：歷史財報】
      run: |
        python scripts/update_data.py

    - name: 🏃 執行【二號工人：每月營收】
      run: |
        python scripts/update_monthly_rev.py

    - name: 💾 自動存檔並推回 GitHub (Git Bot)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 把 data 資料夾內產生的所有新 CSV 檔都抓起來
        git add data/ || true
        
        if git diff --staged --quiet; then
          echo "資料無變更，跳過提交。"
        else
          git commit -m "🤖 自動接力：擴充台股財報與月營收資料庫 [GitHub Actions]"
          git push
        fi
