name: 📈 台股全市場財報自動化中台

on:
  schedule:
    # 核心修改：從原本的每天一次，改成「每 2 個小時執行一次」
    - cron: '0 */2 * * *' 
  
  workflow_dispatch: # 依然保留手動按鈕，方便我們隨時抽查

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 複製專案程式碼
      uses: actions/checkout@v4

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: 🏃 執行全市場財報 ETL 腳本
      run: |
        python scripts/update_data.py

    - name: 💾 自動存檔並推回 GitHub (Git Bot)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ || true
        if git diff --staged --quiet; then
          echo "資料無變更，跳過提交。"
        else
          git commit -m "🤖 自動接力：擴充台股財報資料庫 [GitHub Actions]"
          git push
        fi
